<html>
	<head>
		<title>Cadastro de Usuario</title>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="css.css">
		<link rel="stylesheet" type="text/css" href="css_cadastro.css">
	</head>


	<body>
		<div id="container">
			<div id="cabecalho">
				<h1>Cadastro de Usuario </h1> 
			</div>
			<div id="menu">
				<a href="index.html"> Início </a>
				<a href="usuario.html"> Usuário</a> 
				<a href="">Aluno</a> 
				<a href="">Material</a> 
				<a href="">Relatórios</a>
			</div>

			<div id="corpo">

		<form>
			<br> <br> 
			<label for="Nome">Codigo Usuario: </label>

			<input type="text" name="Codigo Usúario"> <br> </br>
			
			<label for="Nome">Nome: </label>

			<input type="text" name="Nome">  <br> </br>

			<label for="Sexo">Sexo: </label>

				<select name="Sexo">

					<option>Masculino</option>

					<option>Feminino</option>

					<option>Indefinido</option>

				</select> <br> </br>

			<label for="Nome">Data Nascimento: </label>

			<input type="text" name="Data Nascimento"> <br> </br>

			<label for="Nome">RG: </label>

			<input type="text" name="RG"> <br> </br>

			<label for="Nome">CPF: </label>

			<input type="text" name="CPF"> <br> </br>

			<label for="Nome">Telefone: </label>

			<input type="text" name="Telefone"> <br> </br>

			<label for="Nome">Endereco: </label>

			<input type="text" name="Endereço"> <br> </br>

			<label for="Nome">Cidade: </label>

			<input type="text" name="Cidade"> <br> </br>

			<label for="Nome">Instituicao de Ensino: </label>
			<select name="Instituição de Ensino">

					<option>IFPR</option>

					<option>UTFPR</option>

					<option>UFPR</option>

					<option>UEM</option>

					<option>UEL</option>

					<option>UNESPAR</option>

				</select>

					    <label  id="dog" for="Outra_secao">Outra:</label>

						<label> <input type="text" name="Outra_secao"></label> <br> <br> <br>

			
			<label for="Nome">Curso: </label>
				<select name="Curso">

					<option>Tec.Informatica - Sub</option>

					<option>Tec.Informatica - Integrado</option>

					<option>Ciencias da Computacao</option>

					<option>Administracao</option>

					<option>Marketing</option>

					<option>Direito</option>

					<option> Outros </option>

				</select> <br> </br>


			<label for="Nome">Email: </label>

			<input type="text" name="Email"> <br> </br>

			<label for="Nome">Categoria de Usuario: </label>
				<select name="Categoria de Usúario">

					<option>Docente</option>

					<option>Discente</option>

					<option>Servidor</option>

				</select> <br> </br>

			<label for="Nome">Senha: </label>

			<input type="text" name="Senha"> <br> </br>
				
			
			<input type="submit" value="Enviar">
			<input type="reset" name="reset" id="reset" value="Limpar">

			
			<div id="rodape">
				<br> <br> <br> <br> <span>2017 Copyright &copy; - All Rights Reserved (Created By João Correia)</span>
			</div>

		</form>
	</body>

</html>
