<html>
	<head>
		<title>Cadastro de Livros</title>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="css.css">
		<link rel="stylesheet" type="text/css" href="css_cadastro.css">
		
	</head>

	<body>
		<div id="container">
			<div id="cabecalho">
				<h1> Cadastro de Livros </h1> 
			</div>
			<div id="menu">
                               
                                <a href="index.html"> Início</a> 
				<a href="usuario.html"> Usuário</a> 
				<a href="">Aluno</a> 
				<a href="">Material</a> 
				<a href="">Relatórios</a>
			</div>

			<div id="corpo">

		<form>

			        <br> <br> <label for="Nome">Codigo Livro: </label>
        
			        <input type="text" name="Codigo livro"> <br> </br>
			
			        <label for="Nome">Título: </label>

			        <input type="text" name="Título">  <br> </br>

			        <label for="Nome">Autor: </label>

			        <input type="text" name="Autor"> <br> </br>

			        <label for="Nome">Assunto: </label>
			
			        <select name="Assunto">

					<option>Literatura</option>

					<option>Romance</option>

					<option>Biografia</option>

					<option>Ética</option>

					<option>História</option>

					<option>Engenharia de Software</option>

					<option> Linguagens de Programação</option>

					<option> Banco de Dados </option>
				
				</select> <br> </br>

			
			<label for="Nome">Editora: </label>

			                <input type="text" name="Editora"> <br> </br>

			                <label for="Nome">Edição: </label>

			                <input type="text" name="Edição"> <br> </br>

			                <label for="Número de Páginas">Número de Páginas: </label>

			                <input type="integer" name="Número de Páginas"> <br> </br>

			                <label for="Ano do livro">Ano do Livro: </label>

			                <input type="integer" name="Ano do Livro"> <br> </br>
			
			                <textarea name="Descrição" rows="10" cols="50"> Descrição  </textarea><br> </br>

			                <input type="submit" value="Enviar">
					<input type="reset" name="reset" id="reset" value="Limpar">

		</form>
			</div>
			<div id="rodape">
				<br> <br> <br> <br> <span>2017 Copyright &copy; - All Rights Reserved (Created By João Correia)</span>
			</div>
		</div>

	</body>

</html>
